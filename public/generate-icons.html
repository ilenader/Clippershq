<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body style="background:#1a1a2e;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>PWA Icon Generator — Clippers HQ</h2>
<p>Click to generate and download properly sized icons.</p>
<canvas id="c512" width="512" height="512" style="border:1px solid #333;margin:10px"></canvas>
<canvas id="c192" width="192" height="192" style="border:1px solid #333;margin:10px"></canvas>
<br>
<button onclick="download('c512','icon-512.png')" style="padding:12px 24px;margin:10px;background:#0095f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px">Download 512x512</button>
<button onclick="download('c192','icon-192.png')" style="padding:12px 24px;margin:10px;background:#0095f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px">Download 192x192</button>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#0a0d12';
  ctx.fillRect(0, 0, size, size);
  // Glow
  const cx = size / 2, top = size * 0.355, bot = size * 0.705;
  const left = size * 0.32, right = size * 0.68;
  ctx.shadowColor = 'rgba(255,255,255,0.3)';
  ctx.shadowBlur = size * 0.04;
  // Triangle
  ctx.beginPath();
  ctx.moveTo(cx, top);
  ctx.lineTo(right, bot);
  ctx.lineTo(left, bot);
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.shadowBlur = 0;
}
draw('c512', 512);
draw('c192', 192);
function download(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
